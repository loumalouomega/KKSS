# KKSS packaging. Everything the app needs at runtime lives in out/ (esbuild
# bundles all JS; WASM + worker files are copied there by esbuild.mjs) — with
# ONE node_modules exception: node-pty, the embedded terminal's native module
# (N-API, so its binaries work under Electron without a rebuild; loaded from
# build/Release or prebuilds/<platform>-<arch> at runtime).
#
# asar is disabled: mesh's mmgWorkerClient spawns dist-relative worker threads
# (__dirname/mmgWorker.js) and the OCCT/Gmsh services read WASM binaries with
# fs — worker_threads and fs are not asar-aware, and patching paths would mean
# modifying submodule behavior.
appId: org.kratosmultiphysics.kkss
productName: KKSS
copyright: © Vicente Mataix Ferrándiz — AGPL-3.0
asar: false

# electron-updater's update feed. Even with `--publish never`, this makes
# electron-builder emit latest*.yml into release/ and embed app-update.yml in
# each package; the release workflow attaches the feed files to the GitHub
# Release, where the packaged app's About dialog looks for updates.
publish:
  provider: github
  owner: loumalouomega
  repo: KKSS

# Predictable per-target names, e.g. KKSS-0.1.0-linux-arm64.AppImage,
# KKSS-0.1.0-win-x64.exe — the docs Download page (doc/download.md) groups
# release assets by the "-<os>-<arch>." substring, so keep this pattern.
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

files:
  - out/**
  - "!out/**/*.map"
  - "!out/tools/**"
  # node-pty runtime pieces only: lib/ + the platform binaries. Sources,
  # build-time deps, and debug symbols stay out; foreign-platform prebuilds
  # are pruned per target below.
  - node_modules/node-pty/**
  - "!node_modules/node-pty/{src,deps,scripts,third_party,typings,node_modules}/**"
  - "!node_modules/node-pty/**/*.pdb"

directories:
  output: release

# Single 512×512 PNG from the TikZ pipeline (icons/tikz-app/kkss.tex →
# make app); electron-builder derives the .ico/.icns variants from it.
linux:
  icon: icons/app/icon.png
  target:
    - AppImage
    - deb
  category: Science
  maintainer: tote1989@gmail.com
  synopsis: Pre- and post-processing desktop app for Kratos Multiphysics
  files:
    # Linux has no prebuilds — node-pty compiles into build/Release at npm ci.
    - "!node_modules/node-pty/prebuilds/**"

win:
  icon: icons/app/icon.png
  target:
    - nsis
  files:
    - "!node_modules/node-pty/prebuilds/darwin-*/**"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  icon: icons/app/icon-1024.png
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  files:
    - "!node_modules/node-pty/prebuilds/win32-*/**"

npmRebuild: false
