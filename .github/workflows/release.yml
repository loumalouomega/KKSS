name: Release

# Tag-driven release, following the mesh submodule's convention: every
# v*.*.* tag builds installers for the three platforms and attaches them to a
# GitHub Release (prerelease when the tag contains a hyphen).
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Targets: Linux x64 + arm64, Windows x64 + arm64, macOS arm64 — one runner
# per OS/arch. node-pty (the embedded terminal's native module) is why the
# matrix is per-arch: on Linux it compiles from source during npm ci (no
# prebuilds), and on Windows its install step assembles the arch-specific
# ConPTY binaries — both must run on hardware matching the target arch.
# It is N-API, so no Electron-ABI rebuild step is needed.
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: --linux --x64
          - os: ubuntu-24.04-arm
            args: --linux --arm64
          - os: windows-latest
            args: --win --x64
          - os: windows-11-arm
            args: --win --arm64
          - os: macos-latest
            args: --mac --arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            cad/package-lock.json
            mesh/package-lock.json

      - run: npm ci

      - name: Install submodule dependencies
        run: npm run submodules:install

      - name: Build (submodules + app)
        run: npm run build

      - name: Package installers
        run: npx electron-builder ${{ matrix.args }} --publish never

      # latest*.yml + *.blockmap are electron-updater's update feed — the
      # packaged app checks them on the GitHub Release (About ▸ Update now).
      # Names never collide across platforms (latest.yml / latest-mac.yml /
      # latest-linux*.yml), so merge-multiple below is safe.
      - uses: actions/upload-artifact@v4
        with:
          name: kkss-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.exe
            release/*.dmg
            release/*.zip
            release/latest*.yml
            release/*.blockmap
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
