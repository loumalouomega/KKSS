name: Release

# Tag-driven release, following the mesh submodule's convention: every
# v*.*.* tag builds installers for the three platforms and attaches them to a
# GitHub Release (prerelease when the tag contains a hyphen).
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            cad/package-lock.json
            mesh/package-lock.json

      - run: npm ci

      - name: Install submodule dependencies
        run: npm run submodules:install

      - name: Build (submodules + app)
        run: npm run build

      - name: Package installers
        run: npx electron-builder --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: kkss-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
