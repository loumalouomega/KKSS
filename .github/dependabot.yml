version: 2
updates:
  # Root app dependencies (electron, esbuild, vitest, etc.)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Docs site (VitePress)
  - package-ecosystem: npm
    directory: "/doc"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Action versions used in .github/workflows/*.yml
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
