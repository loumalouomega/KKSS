<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- 'unsafe-inline' styles: CodeMirror's style-mod injects <style> elements
       at runtime. This page only — every other page keeps the strict
       style-src (same exception as the terminal page). -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src kkss: 'unsafe-inline'; script-src kkss:" />
  <link href="../theme/vscode-vars.css" rel="stylesheet" />
  <link href="./editor.css" rel="stylesheet" />
  <title>KKSS Editor</title>
</head>
<body>
  <div id="editor-bar">
    <button id="open-btn" title="Open a file in the editor">Open&hellip;</button>
    <button id="save-btn" title="Save (Ctrl+S)">Save</button>
    <button id="save-as-btn" title="Save As (Ctrl+Shift+S)">Save As&hellip;</button>
    <span id="editor-path">No file open — use Open…</span>
  </div>
  <div id="editor-host"></div>
  <script src="./editor.js"></script>
</body>
</html>
